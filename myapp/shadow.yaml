apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-shadow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
      version: shadow
  template:
    metadata:
      labels:
        app: myapp
        version: shadow
    spec:
      containers:
        - name: myapp
          image: myapp:v2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80