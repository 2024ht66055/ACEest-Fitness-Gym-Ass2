apiVersion: apps/v1
kind: Deployment
metadata:
  name: ab-v2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: abapp
      version: v2
  template:
    metadata:
      labels:
        app: abapp
        version: v2
    spec:
      containers:
      - name: myapp
        image: myapp:v2
        imagePullPolicy: Never
        ports:
        - containerPort: 80