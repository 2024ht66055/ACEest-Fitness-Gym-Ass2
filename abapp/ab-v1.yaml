apiVersion: apps/v1
kind: Deployment
metadata:
  name: ab-v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: abapp
      version: v1
  template:
    metadata:
      labels:
        app: abapp
        version: v1
    spec:
      containers:
      - name: myapp
        image: myapp:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 80